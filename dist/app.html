<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omafit App</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #f5f7fb;
      font-family: Inter, Arial, sans-serif;
    }

    #app {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    const omafitDebugLog = () => {};

    const homeModuleUrl = `/assets/home-mn7leucw.min.js?debug=b68c2f-v2`;
    omafitDebugLog("app_html_boot", {
      href: window.location.href,
      userAgent: navigator.userAgent,
      homeModuleUrl,
      clientId: new URLSearchParams(window.location.search).get("client_id") || new URLSearchParams(window.location.search).get("clientId") || null,
    }, "H1");

    window.addEventListener("error", (event) => {
      omafitDebugLog("window_error", {
        message: event.message,
        filename: event.filename,
        lineno: event.lineno,
        colno: event.colno,
      }, "H3");
    });

    window.addEventListener("unhandledrejection", (event) => {
      omafitDebugLog("unhandled_rejection", {
        reason: String(event.reason),
      }, "H3");
    });

    import(homeModuleUrl)
      .then(() => {
        omafitDebugLog("home_module_import_success", {
          homeModuleUrl,
        }, "H1");
      })
      .catch((error) => {
        omafitDebugLog("home_module_import_failure", {
          homeModuleUrl,
          message: error instanceof Error ? error.message : String(error),
          stack: error instanceof Error ? error.stack : null,
        }, "H2");
      });
  </script>
</body>
</html>
